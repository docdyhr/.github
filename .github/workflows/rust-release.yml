# .github/workflows/rust-release.yml
#
# REUSABLE WORKFLOW — Rust release pipeline for docdyhr/* repos.
# Covers: validate → test → build (5 targets) → attest → GitHub release
#         → crates.io publish (OIDC). Homebrew update and post-release
#         monitoring are left to the caller as optional extra jobs.
#
# Usage:
#   uses: docdyhr/.github/.github/workflows/rust-release.yml@v1
#   with:
#     binary-name: my-binary
#   secrets: inherit

name: Rust Release (reusable)

on:
  workflow_call:
    inputs:
      binary-name:
        description: "Binary/crate name (used for artifact filenames)"
        type: string
        required: true
    outputs:
      version:
        description: "Resolved semver version string (no v prefix)"
        value: ${{ jobs.validate.outputs.version }}

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "version=${INPUT_TAG#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate semver format
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable

      - name: Validate crate
        run: cargo check --release

  test:
    name: Test (${{ matrix.os }})
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable

      - name: Run tests
        run: cargo test --all --release --verbose
        shell: bash

  build-release:
    name: Build (${{ matrix.target }})
    needs: [validate, test]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      attestations: write
      id-token: write
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin-ext: ""
            archive-ext: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            bin-ext: ""
            archive-ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin-ext: ".exe"
            archive-ext: zip
          - os: macos-latest
            target: x86_64-apple-darwin
            bin-ext: ""
            archive-ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            bin-ext: ""
            archive-ext: tar.gz
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        env:
          BINARY: ${{ inputs.binary-name }}
          TARGET: ${{ matrix.target }}
          BIN_EXT: ${{ matrix.bin-ext }}
          ARCHIVE_EXT: ${{ matrix.archive-ext }}
        run: |
          binary_name="${BINARY}${BIN_EXT}"
          archive="${BINARY}-${TARGET}.${ARCHIVE_EXT}"
          if [[ "$ARCHIVE_EXT" == "zip" ]]; then
            7z a "$archive" "./target/${TARGET}/release/${binary_name}"
          else
            tar -czf "$archive" -C "./target/${TARGET}/release" "$binary_name"
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ inputs.binary-name }}-${{ matrix.target }}.*

      - name: Upload release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.binary-name }}-${{ matrix.target }}
          path: ${{ inputs.binary-name }}-${{ matrix.target }}.*

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build-release]
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8

      - name: Extract changelog section
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          if [[ -f "CHANGELOG.md" ]]; then
            awk "/^## \[?${VERSION}\]?/,/^## \[?[0-9]/ {
              if (/^## \[?[0-9]/ && !/^## \[?${VERSION}\]?/) exit
              print
            }" CHANGELOG.md > current_changelog.md
          fi
          if [[ ! -s current_changelog.md ]]; then
            printf 'Release v%s\n\nSee commit history for changes.\n' "$VERSION" > current_changelog.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: Release v${{ needs.validate.outputs.version }}
          body_path: current_changelog.md
          files: ${{ inputs.binary-name }}-*/${{ inputs.binary-name }}-*

  publish-crate:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    needs: [validate, create-release]
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 15
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable

      - name: Authenticate with crates.io (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          VERSION: ${{ needs.validate.outputs.version }}
          BINARY: ${{ inputs.binary-name }}
        run: |
          cargo publish || {
            if cargo search "$BINARY" --limit 1 | grep -q "\"${VERSION}\""; then
              echo "Version ${VERSION} already published, skipping"
              exit 0
            fi
            echo "Publish failed, retrying in 30s..."
            sleep 30
            cargo publish
          }
