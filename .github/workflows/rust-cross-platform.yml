# .github/workflows/rust-cross-platform.yml
#
# REUSABLE WORKFLOW — Weekly cross-platform build and test validation.
# Builds for 9 targets (native + cross-compiled), runs platform-specific
# tests, validates artifact presence, and uploads a summary report.
#
# Usage:
#   uses: docdyhr/.github/.github/workflows/rust-cross-platform.yml@v1
#   with:
#     binary-name: my-binary

name: Rust Cross-Platform Validation (reusable)

on:
  workflow_call:
    inputs:
      binary-name:
        description: "Binary name (without .exe) used for artifact naming and smoke tests"
        type: string
        required: true
      test-type:
        description: "Scope of testing: full | quick | targets-only"
        type: string
        default: "full"
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  cross-compile-targets:
    name: Cross-Compile (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            cross: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
          - os: windows-latest
            target: i686-pc-windows-msvc
            cross: false
          - os: macos-latest
            target: x86_64-apple-darwin
            cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            cross: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --locked

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (native)
        if: matrix.cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross-compile)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Run tests (native only)
        if: ${{ matrix.cross == false && inputs.test-type != 'targets-only' }}
        run: cargo test --target ${{ matrix.target }} --verbose

      - name: Smoke test (native)
        if: matrix.cross == false
        env:
          BINARY: ${{ inputs.binary-name }}
          TARGET: ${{ matrix.target }}
          OS: ${{ matrix.os }}
        shell: bash
        run: |
          binary_path="target/${TARGET}/release/${BINARY}"
          if [[ "$OS" == "windows-latest" ]]; then
            binary_path="${binary_path}.exe"
          fi
          $binary_path --version

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.binary-name }}-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ inputs.binary-name }}*
          retention-days: 7

  platform-specific-tests:
    name: Platform Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: inputs.test-type != 'targets-only'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            bin-ext: ""
          - os: windows-latest
            bin-ext: ".exe"
          - os: macos-latest
            bin-ext: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable

      - name: Build release binary
        run: cargo build --release

      - name: Test file path handling (spaces in filenames)
        shell: bash
        env:
          BINARY: ${{ inputs.binary-name }}
          BIN_EXT: ${{ matrix.bin-ext }}
        run: |
          mkdir -p "test dir/sub dir"
          echo "test content" > "test dir/sub dir/test file.txt"
          ./target/release/${BINARY}${BIN_EXT} "test dir/sub dir/test file.txt" --mode=plain --max-lines=1

      - name: Test Unicode handling
        shell: bash
        env:
          BINARY: ${{ inputs.binary-name }}
          BIN_EXT: ${{ matrix.bin-ext }}
        run: |
          echo "Hello, 世界! 🦀" > unicode_test.txt
          ./target/release/${BINARY}${BIN_EXT} unicode_test.txt --mode=plain --max-lines=1

      - name: Test large file handling
        shell: bash
        env:
          BINARY: ${{ inputs.binary-name }}
          BIN_EXT: ${{ matrix.bin-ext }}
        run: |
          python3 -c "for i in range(1000): print(f'line {i+1} with some content')" > large_test.txt
          ./target/release/${BINARY}${BIN_EXT} large_test.txt --max-lines=100 --mode=plain > /dev/null
          ./target/release/${BINARY}${BIN_EXT} large_test.txt --max-lines=100 --max-bytes=1024 --mode=plain > /dev/null

      - name: Test error handling (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        env:
          BINARY: ${{ inputs.binary-name }}
        run: |
          set +e
          ./target/release/$BINARY nonexistent.txt 2>&1 | grep -qi "error" || echo "Error handling test passed"
          set -e

      - name: Test error handling (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          BINARY: ${{ inputs.binary-name }}
        run: |
          $output = & "./target/release/$env:BINARY.exe" nonexistent.txt 2>&1 | Out-String
          Write-Host "Error handling test passed"

  integration-validation:
    name: Integration Validation
    runs-on: ubuntu-latest
    if: inputs.test-type == 'full'
    needs: [cross-compile-targets]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: ./artifacts

      - name: Validate binary artifacts
        env:
          BINARY: ${{ inputs.binary-name }}
        run: |
          echo "📦 Validating binary artifacts..."
          find ./artifacts -name "${BINARY}*" -type f -exec ls -la {} \;

          expected_targets=(
            "x86_64-unknown-linux-gnu"
            "x86_64-unknown-linux-musl"
            "x86_64-pc-windows-msvc"
            "x86_64-apple-darwin"
            "aarch64-apple-darwin"
          )

          for target in "${expected_targets[@]}"; do
            if find ./artifacts -path "*${BINARY}-${target}*" -name "${BINARY}*" | grep -q .; then
              echo "✅ Found binary for $target"
            else
              echo "❌ Missing binary for $target"
              exit 1
            fi
          done
          echo "🎯 All expected binaries present!"

  cross-platform-report:
    name: Cross-Platform Report
    runs-on: ubuntu-latest
    if: always()
    needs: [cross-compile-targets, platform-specific-tests, integration-validation]
    steps:
      - name: Generate report
        run: |
          {
            echo "# Cross-Platform Validation Report"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Cross-Compile Targets | ${{ needs.cross-compile-targets.result }} |"
            echo "| Platform-Specific Tests | ${{ needs.platform-specific-tests.result }} |"
            echo "| Integration Validation | ${{ needs.integration-validation.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
