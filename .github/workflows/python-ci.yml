# .github/workflows/python-ci.yml
#
# REUSABLE WORKFLOW — Generic Python CI/CD pipeline.
#
# Lives at: docdyhr/.github/.github/workflows/python-ci.yml
# Consumers reference this via:
#
#     uses: docdyhr/.github/.github/workflows/python-ci.yml@v1
#
# Always pin to an immutable tag (@v1), not a branch. Re-tagging v1 is
# audit-logged — never reference @main from a consumer.
#
# ─── What it does ────────────────────────────────────────────────────────────
# Five-stage pipeline:
#   lint         — run the project lint command
#   package      — python -m build + twine check
#   test         — matrix across OS × Python versions
#   test-summary — always-run gate (fails the pipeline if any test cell failed)
#   release      — GitHub Release on v* tags (enable-release=true, default)
#
# ─── All inputs have defaults — callers override only what differs. ───────────
#
# ─── Required permissions (caller must set at workflow level) ─────────────────
#   contents: write   — needed by the release job
#
# ─── Optional secrets (pass via secrets: inherit) ────────────────────────────
#   CODECOV_TOKEN     — coverage upload token; skipped gracefully if absent
#
# ─── SECURITY ────────────────────────────────────────────────────────────────
# inputs.apt-deps, brew-deps, lint-command, test-command, and build-command
# are interpolated into shell run: steps. Callers must be within the docdyhr
# org or otherwise trusted. Never call this workflow from an untrusted fork.

name: Python CI (reusable)

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version for lint/package/release jobs"
        type: string
        default: "3.13"
        required: false
      python-versions:
        description: "JSON array of Python versions for the test matrix"
        type: string
        default: '["3.11","3.12","3.13"]'
        required: false
      os-matrix:
        description: "JSON array of runner OS labels for the test matrix"
        type: string
        default: '["ubuntu-latest","macos-latest"]'
        required: false
      apt-deps:
        description: "Space-separated apt packages to install on Linux runners"
        type: string
        default: ""
        required: false
      brew-deps:
        description: "Space-separated Homebrew packages to install on macOS runners"
        type: string
        default: ""
        required: false
      lint-command:
        description: "Shell command to run for linting (from repo root)"
        type: string
        default: "bash scripts/lint.sh check"
        required: false
      test-command:
        description: "Shell command to run the test suite (from repo root)"
        type: string
        default: "bash scripts/run_tests.sh"
        required: false
      build-command:
        description: "Pre-test build command; empty string to skip"
        type: string
        default: "make build"
        required: false
      requirements-dev:
        description: "Dev requirements file path"
        type: string
        default: "requirements-dev.txt"
        required: false
      enable-release:
        description: "Create a GitHub Release on v* tag pushes"
        type: boolean
        default: true
        required: false
    secrets:
      CODECOV_TOKEN:
        description: "Codecov upload token (optional — skipped gracefully if absent)"
        required: false

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
      - uses: actions/cache@v5
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}
      - name: Install system dependencies
        if: inputs.apt-deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.apt-deps }}
      - name: Set up virtualenv
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r ${{ inputs.requirements-dev }}
          .venv/bin/pip install -e .
      - name: Lint
        run: ${{ inputs.lint-command }}

  package:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
      - uses: actions/cache@v5
        with:
          path: .venv
          key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}
      - name: Install system dependencies
        if: inputs.apt-deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.apt-deps }}
      - name: Set up virtualenv
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install build twine
          .venv/bin/pip install -e .
      - name: Build and verify package
        run: |
          if [ -n "${{ inputs.build-command }}" ]; then
            ${{ inputs.build-command }} || echo "Build command skipped on $(uname -s)"
          fi
          python -m build
          python -m twine check dist/*

  test:
    runs-on: ${{ matrix.os }}
    needs: package
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJson(inputs.os-matrix) }}
        python-version: ${{ fromJson(inputs.python-versions) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-py${{ matrix.python-version }}-pip-${{ hashFiles('**/requirements*.txt') }}
      - uses: actions/cache@v5
        with:
          path: .venv
          key: ${{ runner.os }}-py${{ matrix.python-version }}-venv-${{ hashFiles('**/requirements*.txt') }}
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux' && inputs.apt-deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.apt-deps }}
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS' && inputs.brew-deps != ''
        run: brew install ${{ inputs.brew-deps }}
      - name: Set up virtualenv
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r ${{ inputs.requirements-dev }}
          .venv/bin/pip install -e .
      - name: Build
        if: inputs.build-command != ''
        run: ${{ inputs.build-command }}
      - name: Test
        run: ${{ inputs.test-command }}
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
          if-no-files-found: ignore
      - name: Upload to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == inputs.python-version
        uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          directory: ./htmlcov/

  test-summary:
    if: always()
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Report result
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ All tests passed successfully!"
          else
            echo "❌ Some tests failed. See detailed job results."
            exit 1
          fi

  release:
    runs-on: ubuntu-latest
    needs: test-summary
    if: inputs.enable-release && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install system dependencies
        if: inputs.apt-deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.apt-deps }} zip
      - name: Set up virtualenv
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install -e .
      - name: Build
        if: inputs.build-command != ''
        run: ${{ inputs.build-command }}
      - name: Create release archives
        run: |
          REPO_NAME=$(basename "${{ github.repository }}")
          mkdir -p dist
          tar -czf "dist/${REPO_NAME}-${{ github.ref_name }}.tar.gz" --exclude='.git' --exclude='dist' .
          zip -r "dist/${REPO_NAME}-${{ github.ref_name }}.zip" . -x "*.git*" "dist/*"
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: dist/*
          draft: false
          prerelease: false
