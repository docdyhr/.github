# .github/workflows/rust-ci.yml
#
# REUSABLE WORKFLOW — Optimised Rust CI for docdyhr/* repos.
# Runs: quick validation (fmt+clippy), multi-platform test matrix,
# docs+coverage, security audit, and an aggregated status gate.
#
# Usage:
#   uses: docdyhr/.github/.github/workflows/rust-ci.yml@v1
#   with:
#     binary-name: my-binary

name: Rust CI (reusable)

on:
  workflow_call:
    inputs:
      binary-name:
        description: "Release binary name used for the smoke test"
        type: string
        required: true
      extra-test-features:
        description: "Extra cargo features to enable on the 'all' matrix leg (space-separated)"
        type: string
        default: ""
        required: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  quick-check:
    name: Quick Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check for large files
        run: |
          large_files=$(find . -type f -size +5M | grep -v "^./.git" || true)
          if [ -n "$large_files" ]; then
            echo "Error: Large files detected:"
            echo "$large_files"
            exit 1
          fi

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Quick clippy
        run: cargo clippy --no-deps -- -D warnings

  test-matrix:
    name: Test (${{ matrix.os }} / ${{ matrix.rust }})
    needs: quick-check
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
            features: all
          - os: windows-latest
            rust: stable
            features: default
          - os: macos-latest
            rust: stable
            features: default
          - os: ubuntu-latest
            rust: beta
            features: all
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: ${{ matrix.rust }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}
          cache-all-crates: true

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.features }}" = "all" ]; then
            cargo build --all-features --release
          else
            cargo build --release
          fi

      - name: Test
        shell: bash
        run: |
          if [ "${{ matrix.features }}" = "all" ]; then
            cargo test --all-features --release
          else
            cargo test --release
          fi

      - name: Smoke test
        if: matrix.os == 'ubuntu-latest'
        env:
          BINARY: ${{ inputs.binary-name }}
        run: ./target/release/$BINARY --version

  docs-coverage:
    name: Docs & Coverage
    needs: quick-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        run: |
          if ! command -v cargo-llvm-cov &> /dev/null; then
            cargo install cargo-llvm-cov --locked
          fi

      - name: Generate coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: ./lcov.info
          fail_ci_if_error: false

      - name: Build documentation
        run: cargo doc --all-features --no-deps

  security:
    name: Security Audit
    needs: quick-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-audit
        run: |
          if ! command -v cargo-audit &> /dev/null; then
            cargo install cargo-audit --locked
          fi

      - name: Security audit
        run: cargo audit --color never

  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [test-matrix, docs-coverage, security]
    if: always()
    steps:
      - name: Check status
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "❌ CI failed"
            exit 1
          elif [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "⚠️ CI cancelled"
            exit 1
          else
            echo "✅ CI passed"
          fi
