name: Feature request
description: Propose a new feature or enhancement
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please describe the **problem** you're trying to solve, not just the solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation or friction does this feature address?
      placeholder: "Currently I have to ... which is painful because ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about or tried?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, prior art, or anything else that helps.
    validations:
      required: false
