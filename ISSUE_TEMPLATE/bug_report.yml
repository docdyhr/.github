name: Bug report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. For security vulnerabilities, see [SECURITY.md](../SECURITY.md) instead.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: I expected X but got Y instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version or commit SHA are you using?
      placeholder: "e.g. v1.2.3 or abc1234"
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, runtime version, or other relevant context.
      placeholder: "e.g. macOS 15.4, Python 3.12, Node 22"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any relevant error messages or stack traces.
      render: text
    validations:
      required: false
